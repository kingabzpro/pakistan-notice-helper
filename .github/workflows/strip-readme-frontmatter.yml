name: Strip README frontmatter on GitHub

on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strip-frontmatter:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove YAML frontmatter
        id: strip
        shell: python
        run: |
          import os
          from pathlib import Path

          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8")
          lines = content.splitlines(keepends=True)

          if not lines or lines[0].strip() != "---":
              print("README.md has no YAML frontmatter.")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("changed=false\n")
              raise SystemExit(0)

          closing = next(
              (index for index, line in enumerate(lines[1:], start=1)
               if line.strip() == "---"),
              None,
          )
          if closing is None:
              raise SystemExit(
                  "README.md starts with '---' but has no closing frontmatter delimiter."
              )

          body = "".join(lines[closing + 1:]).lstrip("\r\n")
          readme.write_text(body, encoding="utf-8", newline="\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("changed=true\n")

      - name: Commit cleaned README
        if: steps.strip.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Remove Hugging Face metadata from GitHub README"
          git push origin HEAD:main
